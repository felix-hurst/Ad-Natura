name: Unity C# Linter

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        # Points to your specific project folder structure
        run: dotnet restore Game_Files/my_project/my_project.sln

      - name: Verify Code Formatting
        # This will fail the build if code doesn't match your .editorconfig
        run: dotnet format Game_Files/my_project/my_project.sln --verify-no-changes --verbosity diagnostic