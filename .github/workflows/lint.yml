name: Unity C# Linter

on:
  push:
    branches: [ main, marcosChanges ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  checks: write

jobs:
  check-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0 
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Game-Files/my_project/Library
          key: Library-my_project-${{ runner.os }}-${{ hashFiles('Game-Files/my_project/Assets/**', 'Game-Files/my_project/Packages/**', 'Game-Files/my_project/ProjectSettings/**') }}
          restore-keys: |
            Library-my_project-${{ runner.os }}-

      - name: Generate Solution
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: Game-Files/my_project
          customParameters: -batchmode -executeMethod Packages.Rider.Editor.RiderScriptEditor.SyncSolution -quit

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Fix and Commit Formatting
        shell: bash
        run: |
          SLN_PATH=$(find Game-Files/my_project -maxdepth 1 -name "*.sln" | head -n 1)
          echo "Found solution at: $SLN_PATH"

          # Run the fixer (No --verify-no-changes here!)
          dotnet format "$SLN_PATH"

          # If files changed, commit and push
          if [[ -n $(git status --porcelain) ]]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "style: automated formatting fixes"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          else
            echo "No formatting changes needed."
          fi