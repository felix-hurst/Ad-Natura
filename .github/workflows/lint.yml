name: Unity C# Linter

on:
  push:
    branches: [ main,marcosChanges ]
  pull_request:
    branches: [ main,marcosChanges ]

jobs:
  check-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' 

      - name: Verify Code Formatting
        #since .sln is in the gitignore, i am just running it here
        run: dotnet format Game-Files/my_project --verify-no-changes --verbosity diagnostic