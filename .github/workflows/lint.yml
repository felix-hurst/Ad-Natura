name: Unity C# Linter

on:
  push:
    branches: [ main,marcosChanges ]
  pull_request:
    branches: [ main,marcosChanges ]

jobs:
  check-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: List Files (Debug)
        run: find . -maxdepth 4 -not -path '*/.*'

      - name: Restore Dependencies
        run: dotnet restore **/my_project.sln

      - name: Verify Code Formatting
        run: dotnet format **/my_project.sln --verify-no-changes --verbosity diagnostic